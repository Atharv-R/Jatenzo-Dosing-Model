experiment:
  name: outcome_t_fromfile
  seed: 42
  results_dir: results/
data:
  source: file
  abt_path: data/abt.csv
  features:
  - age
  - bmi
  - current_T
  - current_dose
  - new_dose
  outliers:
    policy: winsorize
    lower_pct: 2
    upper_pct: 98
    apply_to:
    - bmi
    - current_T
    - outcome_T
model:
  name: outcome_t
  hyperparameters:
    n_estimators: 400
    learning_rate: 0.05
    max_depth: 3
    l2_regularization: 1.0
evaluation:
  cv:
    scheme: group_kfold
    n_splits: 5
    group_key: subject_id
