data:
  extended_features: []
  features:
  - current_T
  - current_dose
  - target_T
  - bmi
  - age
  group_key: patient_id
  outliers:
    apply_to:
    - bmi
    - current_T
    - serum_T_6h
    keep_in_test: true
    lower_pct: 2
    policy: winsorize
    upper_pct: 98
  raw_sources:
  - ../240624-1019-clar-09007-csr-Transformed Values-KCVBAV.xlsx
  - ../260414-1535-Jatenzo 15012-Transform-Value only-WHTZ.xlsx
  row_granularity: patient_visit
  source: synthetic
  target: next_dose_rubric
evaluation:
  baselines:
  - rubric
  - existing_linear_calculator
  - always_237
  cv:
    n_splits: 5
    scheme: group_kfold
  metrics:
  - rmse
  - pct_in_band
  - exact_dose_accuracy
  - within_one_step_accuracy
  - quadratic_weighted_kappa
  - overshoot_rate
  - undershoot_rate
  - agreement_with_rubric
  - agreement_with_clinician
experiment:
  name: run_ordinal_logistic
  results_dir: results/
  seed: 42
guardrails:
  clamp_to_ladder: true
  enforce_discontinue_at_floor: true
  low_confidence_action: remeasure_7d
  ood_defer_to_rubric: true
model:
  hyperparameters:
    learning_rate: 0.05
    max_depth: 4
    monotone_constraints:
      current_T: -1
    n_estimators: 400
  ladder:
  - 158
  - 198
  - 237
  - 316
  - 396
  max_step_per_visit: 1
  name: ordinal_logistic
  task: ordinal
